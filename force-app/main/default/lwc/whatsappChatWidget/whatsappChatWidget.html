<!-- whatsappChatWidget.html -->
<template>
    <div class="chat-toggle" onclick={toggleChat} if:false={isChatOpen}>
        <div class="whatsapp-icon">
            <!-- Exact WhatsApp SVG Icon -->
            <svg viewBox="0 0 24 24" width="32" height="32" fill="white">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.198-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.474-1.761-1.737-2.203-.263-.442-.027-.67.234-.925.215-.214.484-.537.653-.767.17-.23.227-.402.15-.599-.076-.197-.273-.67-.37-.901-.098-.23-.197-.197-.273-.197-.67 0-1.255.074-1.738.523-.484.449-1.897 1.841-1.897 4.488 0 2.646 1.933 5.195 2.229 5.592.297.398 3.737 5.727 9.014 3.784 1.255-.463 2.03-1.396 2.261-1.77.23-.374.23-1.026.15-1.164z"/>
                <path d="M12 0C5.373 0 0 5.373 0 12c0 2.133.558 4.134 1.53 5.893L0 24l6.107-1.6C7.573 23.279 9.681 24 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.006 0-3.938-.542-5.579-1.538L6 21l-3.442.904L3.462 18.42A9.928 9.928 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
            </svg>
        </div>
        <div class="chat-badge" if:true={hasUnreadMessages}>
            <span>{unreadCount}</span>
        </div>
    </div>

    <template if:true={isChatOpen}>
        <div class="chat-window">
            <!-- WhatsApp Header -->
            <div class="chat-header">
                <div class="contact-info">
                    <div class="contact-avatar">
                        <span class="avatar-initials">{recordInitials}</span>
                    </div>
                    <div class="contact-details">
                        <div class="contact-name">{recordName}</div>
                        <span if:true={is24HourWindowOpen} class="status-indicator online"></span>
                        <span if:false={is24HourWindowOpen} class="status-indicator offline"></span>
                    </div>
                </div>
                <div class="header-actions">
                    <span class="timer-badge" if:true={timeRemainingDisplay}>{timeRemainingDisplay}</span>
                    <button class="action-btn refresh-btn" onclick={handleRefresh} title="Refresh chat">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                        </svg>
                    </button>
                    <button class="action-btn" onclick={toggleChat} title="Close">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Messages Container -->
            <div class="chat-messages-container" onscroll={handleScroll}>
                <div class="chat-messages" lwc:dom="manual"></div>
                <template if:true={showNoMessages}>
                    <div class="no-messages">
                        <div class="no-messages-icon">💬</div>
                        <p>No messages here yet...</p>
                        <p>Send a message to start the conversation.</p>
                    </div>
                </template>
            </div>

            <!-- Chat Input Area -->
            <div class="chat-input-area">
                <template if:true={showStartConversationButton}>
                    <div class="start-conversation-container">
                        <button class="start-conversation-btn" onclick={handleStartConversation} disabled={isLoading}>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M2 17h20v2H2zm1.15-4.05L4 11.47l.85 1.48L12 17l7.15-4.05L20 11.47 18.85 12.95 12 16.88 5.15 12.95zm0-6L4 5.47l.85 1.48L12 11l7.15-4.05L20 5.47 18.85 6.95 12 10.88 5.15 6.95z"/>
                            </svg>
                            <span>Send Template Message</span>
                        </button>
                    </div>
                </template>

                <template if:false={showStartConversationButton}>
                    <!-- Media URL Input (if needed) -->
                    <!-- Replace the media-input-container template with this -->
                    <template if:true={showMediaInput}>
                        <div class="media-input-container">
                            <input type="file" 
                                   class="media-input" 
                                   accept="image/*,video/*"
                                   onchange={handleMediaFileChange}
                                   disabled={isInputDisabledComputed} />
                            <button class="media-close-btn" onclick={hideMediaInput}>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                                </svg>
                            </button>
                        </div>
                    </template>

                    <!-- Message Input Row -->
                    <div class="input-row">
                        <div class="input-actions">
                            <button class="action-btn attach-btn" onclick={toggleMediaInput} title="Attach media" disabled={isInputDisabledComputed}>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
                                </svg>
                            </button>
                        </div>
                        
                        <div class="message-input-container">
                            <textarea class="message-input" 
                                      placeholder={inputPlaceholderComputed}
                                      value={currentMessage}
                                      oninput={handleMessageChange}
                                      onkeyup={handleKeyUp}
                                      disabled={isInputDisabledComputed}
                                      rows="1"></textarea>
                        </div>
                        
                        <button class="send-btn" 
                                onclick={handleSendMessage} 
                                disabled={isSendButtonDisabledComputed}
                                title="Send">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                            </svg>
                        </button>
                    </div>
                </template>
            </div>
        </div>
    </template>
</template>
